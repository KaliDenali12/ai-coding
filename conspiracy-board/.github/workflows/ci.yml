name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: '0 9 * * *' # Daily at 09:00 UTC — catch CVEs between weekly Dependabot runs

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        if: github.event_name != 'schedule'
        run: npm run lint

      - name: Type check
        if: github.event_name != 'schedule'
        run: npx tsc --noEmit

      - name: Test
        if: github.event_name != 'schedule'
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
